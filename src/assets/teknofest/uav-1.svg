  <rect width="1600" height="900" fill="url(#sky1)" />
  <circle cx="800" cy="320" r="360" fill="url(#glow1)" />

  <g transform="translate(800 430)">
    <ellipse cx="0" cy="140" rx="260" ry="38" fill="#0b1220" fill-opacity="0.35" />
    <rect x="-30" y="-40" width="60" height="160" rx="20" fill="#0f172a" />
    <rect x="-340" y="-30" width="680" height="58" rx="28" fill="#111827" />
    <rect x="-72" y="-70" width="144" height="30" rx="15" fill="#1e293b" />
    <polygon points="0,-150 54,-72 -54,-72" fill="#0f172a" />
    <circle cx="-244" cy="0" r="11" fill="#334155" />
    <circle cx="244" cy="0" r="11" fill="#334155" />
  </g>
</svg>
